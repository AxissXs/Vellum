name: Apply Database Migrations

on:
  push:
    branches:
      - master

concurrency:
  group: db-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Drizzle Migrations
    runs-on: ubuntu-latest

    env:
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Allow the workflow to push back to master
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Apply migrations
        run: bun run db:migrate

      - name: Check for changed journal / snapshots
        id: check-changes
        run: |
          if git diff --quiet --exit-code drizzle/meta/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated journal + snapshots
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drizzle/meta/
          git commit -m "chore(db): apply migrations and update journal [skip ci]"
          git push origin HEAD:master
